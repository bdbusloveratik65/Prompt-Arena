<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a12;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* ===== ইন্ট্রো ওভারলে ===== */
        #intro-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: radial-gradient(ellipse at center, #12121f, #0a0a12);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.2s ease, visibility 1.2s ease;
        }

        #intro-overlay.hide-intro {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .intro-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(124, 58, 237, 0.4);
            box-shadow: 0 0 80px rgba(124, 58, 237, 0.25), inset 0 0 80px rgba(124, 58, 237, 0.05);
            animation: introPulse 2s ease-in-out infinite alternate;
            margin-bottom: 1.8rem;
        }

        .intro-name {
            font-size: clamp(3.5rem, 12vw, 6.5rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #c4b5fd, #8b5cf6, #6ee7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: introPulse 2s ease-in-out infinite alternate;
        }

        .intro-version {
            font-size: 1.3rem;
            font-weight: 600;
            color: #94a3b8;
            margin-top: 0.3rem;
            letter-spacing: 0.4em;
            animation: fadeSlideUp 1.2s ease-out 0.4s both;
            border: 1px solid rgba(148, 163, 184, 0.15);
            padding: 0.4rem 1.5rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            background: rgba(255, 255, 255, 0.03);
        }

        .intro-loader {
            margin-top: 2.8rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid rgba(124, 58, 237, 0.15);
            border-top-color: #8b5cf6;
            animation: spin 1s linear infinite;
        }

        /* ===== মূল সাইট ===== */
        #main-site {
            width: 100%;
            max-width: 1200px;
            padding: 1.5rem 2rem;
            opacity: 0;
            animation: siteFadeIn 1s ease 1.8s forwards;
        }

        /* ===== ব্যানার এড ===== */
        .banner-ad {
            background: linear-gradient(145deg, rgba(30, 27, 46, 0.8), rgba(20, 18, 31, 0.8));
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 0.8rem 1.5rem;
            text-align: center;
            border: 1px solid rgba(124, 58, 237, 0.12);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            margin-bottom: 2rem;
            animation: bannerGlow 4s ease-in-out infinite alternate;
            min-height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .banner-ad.bottom {
            margin-top: 2rem;
            margin-bottom: 0;
        }

        .banner-ad iframe {
            max-width: 100%;
            border: none;
            border-radius: 8px;
        }

        /* ===== হোমপেজ কার্ড ===== */
        .home-card {
            background: linear-gradient(145deg, rgba(20, 22, 36, 0.85), rgba(14, 15, 28, 0.9));
            backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            padding: 3rem 2.5rem;
            border: 1px solid rgba(124, 58, 237, 0.15);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: cardFloat 8s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .home-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(124, 58, 237, 0.06), transparent 60%);
            pointer-events: none;
            animation: cardGlow 10s ease-in-out infinite alternate;
        }

        /* ===== লোগো + টাইটেল ===== */
        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin-bottom: 1rem;
            animation: logoEntrance 1s ease-out 2s both;
            position: relative;
            z-index: 1;
        }

        .logo-image {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(124, 58, 237, 0.3);
            box-shadow: 0 0 50px rgba(124, 58, 237, 0.15);
            animation: iconBounce 3s ease-in-out infinite;
        }

        .site-title {
            font-size: clamp(2.8rem, 8vw, 4.8rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #e0d7ff, #8b5cf6, #6ee7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        /* ===== বিবরণ সেকশন ===== */
        .description {
            max-width: 750px;
            margin: 0.5rem 0 1.8rem 0;
            position: relative;
            z-index: 1;
            animation: fadeSlideUp 0.9s ease-out 2.4s both;
        }

        .description .sub-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #c4b5fd;
            letter-spacing: 0.05em;
            margin-bottom: 1.2rem;
            text-shadow: 0 0 30px rgba(167, 139, 250, 0.15);
        }

        .description .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.8rem 1.5rem;
            text-align: left;
            padding: 0.5rem 0;
        }

        .description .features .feature-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-size: 0.95rem;
            color: #d4d4e8;
            padding: 0.4rem 0.6rem;
            border-radius: 10px;
            transition: background 0.3s ease;
        }

        .description .features .feature-item i {
            color: #8b5cf6;
            font-size: 1rem;
            width: 20px;
            text-align: center;
        }

        .description .features .feature-item:hover {
            background: rgba(124, 58, 237, 0.08);
        }

        .description .highlight-text {
            margin-top: 1.2rem;
            font-size: 0.95rem;
            color: #94a3b8;
            background: rgba(124, 58, 237, 0.06);
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            border: 1px solid rgba(124, 58, 237, 0.08);
            display: inline-block;
        }

        .description .highlight-text i {
            color: #fbbf24;
            margin-right: 0.5rem;
        }

        /* ===== বাটন ===== */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            border: none;
            padding: 1rem 3.5rem;
            border-radius: 80px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.05em;
            cursor: pointer;
            box-shadow: 0 8px 40px rgba(124, 58, 237, 0.35);
            transition: all 0.3s ease;
            animation: btnPulse 2.5s ease-in-out infinite, fadeSlideUp 0.8s ease-out 2.8s both;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none;
            text-align: center;
            z-index: 1;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 255, 255, 0.08), transparent 60%);
            animation: rotateBg 8s linear infinite;
        }

        .btn-primary i {
            font-size: 1.2rem;
            position: relative;
            z-index: 2;
        }

        .btn-primary span {
            position: relative;
            z-index: 2;
        }

        .btn-primary:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 15px 50px rgba(124, 58, 237, 0.5);
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }

        /* ===== অ্যানিমেশন ===== */
        @keyframes introPulse {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(25px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes siteFadeIn {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes bannerGlow {
            0% { border-color: rgba(124, 58, 237, 0.1); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4); }
            100% { border-color: rgba(124, 58, 237, 0.3); box-shadow: 0 4px 40px rgba(124, 58, 237, 0.08); }
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }

        @keyframes cardGlow {
            0% { opacity: 0.3; transform: translate(0, 0); }
            100% { opacity: 1; transform: translate(10%, 10%); }
        }

        @keyframes logoEntrance {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            100% { opacity: 1; transform: scale(1) rotate(0); }
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-6px) scale(1.04); }
        }

        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 10px rgba(124, 58, 237, 0.15)); }
            100% { filter: drop-shadow(0 0 35px rgba(124, 58, 237, 0.35)); }
        }

        @keyframes btnPulse {
            0% { box-shadow: 0 8px 40px rgba(124, 58, 237, 0.3); }
            50% { box-shadow: 0 8px 60px rgba(124, 58, 237, 0.5); }
            100% { box-shadow: 0 8px 40px rgba(124, 58, 237, 0.3); }
        }

        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ===== রেসপন্সিভ ===== */
        @media (max-width: 768px) {
            #main-site { padding: 1rem; }
            .home-card { padding: 2rem 1.5rem; border-radius: 2rem; }
            .logo-image { width: 65px; height: 65px; }
            .description .features { grid-template-columns: 1fr 1fr; gap: 0.4rem; }
            .description .features .feature-item { font-size: 0.85rem; padding: 0.3rem 0.4rem; }
            .btn-primary { padding: 0.8rem 2.2rem; font-size: 1rem; }
            .intro-version { font-size: 1rem; padding: 0.25rem 1rem; }
            .intro-logo { width: 90px; height: 90px; }
            .description .sub-title { font-size: 1.1rem; }
        }

        @media (max-width: 480px) {
            .description .features { grid-template-columns: 1fr; }
            .logo-wrapper { flex-direction: column; gap: 0.5rem; }
            .site-title { font-size: 2.5rem; }
            .home-card { padding: 1.5rem 1rem; }
            .banner-ad { min-height: 60px; padding: 0.5rem 0.8rem; }
            .description .highlight-text { font-size: 0.8rem; padding: 0.5rem 1rem; }
        }
    </style>
</head>
